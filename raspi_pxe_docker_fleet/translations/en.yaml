configuration:
  log_level:
    name: Log level
    description: Controls add-on verbosity. Use debug to enable verbose provisioning logs and TFTP request logging.
  server_ip:
    name: Server IP
    description: Optional override for the Home Assistant host IP used in TFTP and NFS paths.
  default_username:
    name: Default username
    description: Linux username to create on each Raspberry Pi during first boot.
  default_password:
    name: Default password
    description: Optional password for the created user. Supply this or SSH authorized keys.
  default_timezone:
    name: Default timezone
    description: >-
      Optional IANA timezone name to apply on first boot. Leave blank to keep
      the image default. Examples: Australia/Melbourne, America/New_York,
      Europe/London. Full timezone list: https://data.iana.org/time-zones/tzdb-2025a/zone1970.tab
  default_keyboard_layout:
    name: Default keyboard layout
    description: >-
      Optional XKB keyboard layout code to apply on first boot. Leave blank to
      keep the image default. Examples: gb, us, de, fr. Layout list:
      https://sources.debian.org/src/xkeyboard-config/2.42-1/rules/base.lst/
  default_locale:
    name: Default locale
    description: >-
      Optional locale name to apply on first boot. Leave blank to keep the
      image default. Examples: en_AU.UTF-8, en_US.UTF-8, de_DE.UTF-8. Locale
      list: https://sources.debian.org/src/glibc/2.31-11/localedata/SUPPORTED/
  boot_config_lines:
    name: Boot config lines
    description: >-
      Optional multiline entries to append into each client's main config.txt
      on the exported boot partition. Example: dtparam=i2c_arm=on
  ssh_authorized_keys:
    name: SSH authorized keys
    description: Optional newline-separated public keys for the created user.
  clients:
    name: Raspberry Pi clients
    description: Serial, model, hostname, optional image override, optional per-client boot config lines, and per-client Docker workload definitions. The containers field supports simple line-based shorthands or a JSON array of detailed specs.
